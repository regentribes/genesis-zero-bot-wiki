<header class="site-header" role="banner">
  <div class="wrapper">
    <div class="header-row">
      <a class="site-title" rel="author" href="{{ '/' | relative_url }}">{{ site.title | escape }}</a>
      <nav class="site-nav">
        <input type="checkbox" id="nav-trigger" class="nav-trigger" />
        <label for="nav-trigger">
          <span class="menu-icon">{% include svg/menu.svg %}</span>
        </label>
        <div class="trigger">
          {% for page in site.pages %}
            {% if page.title %}
            <a class="page-link" href="{{ page.url | relative_url }}">{{ page.title | escape }}</a>
            {% endif %}
          {% endfor %}
        </div>
      </nav>
      <button id="theme-toggle-wiki" class="theme-btn" onclick="toggleWikiTheme()" aria-label="Toggle theme (dark/light)" title="Toggle theme">&#9790;</button>
    </div>
  </div>
</header>
