<!-- Theme: compact nav, minimal vars, aligned to ADR style — injected by minima -->
<style>
/* ── Base: dark (default) ── */
:root {
  --wiki-bg: #0d1117;
  --wiki-text: #e6edf3;
  --wiki-heading: #f0f6fc;
  --wiki-link: #52b788;
  --wiki-link-hover: #74c69d;
  --wiki-border: #30363d;
  --wiki-nav-bg: #161b22;
  --wiki-code-bg: #1e1e1e;
  --wiki-code-text: #f97583;
  --wiki-muted: #8b949e;
  --wiki-nav-height: 44px;
}
/* ── Light override ── */
body.light {
  --wiki-bg: #ffffff;
  --wiki-text: #1a1a1a;
  --wiki-heading: #000000;
  --wiki-link: #2d6a4f;
  --wiki-link-hover: #1b4332;
  --wiki-border: #dee2e6;
  --wiki-nav-bg: #f8f9fa;
  --wiki-code-bg: #f4f4f4;
  --wiki-code-text: #c7254e;
  --wiki-muted: #6c757d;
}
*, *::before, *::after { box-sizing: border-box; }
html { font-size: 17px; }
body {
  background: var(--wiki-bg);
  color: var(--wiki-text);
  font-family: Georgia, 'Times New Roman', 'Book Antiqua', Palatino, serif;
  line-height: 1.75;
  margin: 0;
  padding: 0;
  transition: background 0.2s ease, color 0.2s ease;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* ── Compact site header ── */
.site-header {
  background: var(--wiki-nav-bg) !important;
  border-bottom: 1px solid var(--wiki-border) !important;
  position: sticky;
  top: 0;
  z-index: 100;
  height: var(--wiki-nav-height);
}
.site-header .wrapper {
  max-width: 960px;
  margin: 0 auto;
  padding: 0 1rem;
  height: 100%;
}
.header-row {
  display: flex;
  align-items: center;
  height: var(--wiki-nav-height);
  gap: 0;
}
.site-title {
  color: var(--wiki-heading) !important;
  font-size: 1rem !important;
  font-weight: 700;
  text-decoration: none !important;
  white-space: nowrap;
  letter-spacing: -0.01em;
  flex-shrink: 0;
  margin-right: 1.25rem;
}

/* ── Nav: compact horizontal ── */
.site-nav {
  display: flex;
  align-items: center;
  flex: 1;
  min-width: 0;
}
.nav-trigger { display: none; }
.nav-label {
  display: none;
  cursor: pointer;
  padding: 4px 8px;
  border-radius: 4px;
  color: var(--wiki-text);
}
.menu-icon { display: flex; align-items: center; }
.trigger {
  display: flex;
  flex-wrap: nowrap;
  gap: 0;
  overflow-x: auto;
  scrollbar-width: none;
  -ms-overflow-style: none;
}
.trigger::-webkit-scrollbar { display: none; }
.page-link {
  color: var(--wiki-link) !important;
  text-decoration: none !important;
  font-size: 0.8rem !important;
  white-space: nowrap;
  padding: 4px 10px !important;
  border-radius: 4px;
  transition: background 0.15s, color 0.15s;
  font-family: system-ui, -apple-system, sans-serif !important;
  flex-shrink: 0;
}
.page-link:hover {
  background: var(--wiki-border) !important;
  color: var(--wiki-link-hover) !important;
}

/* ── Main content ── */
main.page-content {
  flex: 1;
  padding: 1.5rem 0;
}
main.page-content .wrapper {
  max-width: 780px;
  margin: 0 auto;
  padding: 0 1rem;
}

/* ── Typography ── */
h1,h2,h3,h4,h5,h6 {
  color: var(--wiki-heading);
  font-weight: 600;
  line-height: 1.3;
  margin: 1.5rem 0 0.5rem;
}
h1 { font-size: 1.6rem; margin-top: 0.5rem; }
h2 { font-size: 1.25rem; border-bottom: 1px solid var(--wiki-border); padding-bottom: 0.25rem; }
h3 { font-size: 1.05rem; }
a { color: var(--wiki-link); text-decoration: none; }
a:hover { color: var(--wiki-link-hover); text-decoration: underline; }

/* ── Article ── */
.post-header { margin-bottom: 1rem; }
.post-title { font-size: 1.4rem; margin: 0 0 0.25rem; color: var(--wiki-heading); }
.post-content h1 { font-size: 1.5rem; margin: 1.5rem 0 0.5rem; }
.post-content h2 { font-size: 1.2rem; border-bottom: 1px solid var(--wiki-border); padding-bottom: 0.25rem; margin: 1.25rem 0 0.5rem; }
.post-content h3 { font-size: 1rem; margin: 1rem 0 0.4rem; }
.post-content p { margin: 0.6rem 0; }

/* ── Code ── */
code {
  background: var(--wiki-code-bg) !important;
  color: var(--wiki-code-text) !important;
  border: none !important;
  padding: 1px 5px;
  font-size: 0.875em;
  font-family: 'Courier New', Courier, monospace;
  border-radius: 3px;
}
.highlight, pre {
  background: var(--wiki-code-bg) !important;
  border: 1px solid var(--wiki-border);
  padding: 0.75rem 1rem;
  overflow-x: auto;
  font-size: 0.85em;
  line-height: 1.5;
  border-radius: 6px;
  margin: 0.75rem 0;
}
pre code { background: transparent !important; color: inherit !important; padding: 0; border: none !important; }

/* ── Blockquote ── */
blockquote {
  border-left: 3px solid var(--wiki-link) !important;
  margin: 1rem 0;
  padding: 0.5rem 1rem;
  color: var(--wiki-text);
  opacity: 0.9;
  background: var(--wiki-nav-bg);
  border-radius: 0 4px 4px 0;
}

/* ── Tables ── */
table {
  border-collapse: collapse !important;
  border: 1px solid var(--wiki-border) !important;
  width: 100%;
  margin: 1rem 0;
  font-size: 0.95em;
}
th {
  background: var(--wiki-nav-bg) !important;
  color: var(--wiki-heading) !important;
  border: 1px solid var(--wiki-border) !important;
  padding: 6px 12px;
  font-weight: 700;
  text-align: left;
  font-size: 0.85em;
  font-family: system-ui, -apple-system, sans-serif;
}
td {
  border: 1px solid var(--wiki-border) !important;
  padding: 6px 12px;
  color: var(--wiki-text) !important;
}
tbody tr:nth-child(even) td { background: var(--wiki-nav-bg); opacity: 0.5; }

/* ── Footer ── */
.site-footer {
  border-top: 1px solid var(--wiki-border);
  background: var(--wiki-nav-bg);
  color: var(--wiki-muted);
  font-size: 0.8em;
  padding: 0.75rem 1rem;
  text-align: center;
  margin-top: auto;
}
.site-footer a { color: var(--wiki-link); }

/* ── Tag cloud — ultra-compact pill row ── */
.tags {
  display: flex;
  flex-wrap: wrap;
  gap: 3px;
  padding: 0 !important;
  margin: 0.5rem 0 !important;
}
.tags a, .tag {
  background: var(--wiki-nav-bg) !important;
  color: var(--wiki-link) !important;
  border: 1px solid var(--wiki-border) !important;
  padding: 1px 5px !important;
  font-size: 0.65em !important;
  font-family: 'Courier New', monospace !important;
  text-decoration: none !important;
  border-radius: 3px;
  line-height: 1.4;
  letter-spacing: 0.02em;
}
.tags a:hover { background: var(--wiki-border) !important; color: var(--wiki-link-hover) !important; }

/* ── Theme toggle: fixed top-right ── */
.theme-btn {
  position: fixed;
  top: 8px;
  right: 10px;
  z-index: 200;
  background: var(--wiki-nav-bg);
  border: 1px solid var(--wiki-border);
  color: var(--wiki-text);
  border-radius: 16px;
  font-size: 0.85rem;
  cursor: pointer;
  padding: 3px 10px;
  transition: background 0.2s;
  font-family: inherit;
  line-height: 1;
  height: 26px;
  display: flex;
  align-items: center;
}
.theme-btn:hover { background: var(--wiki-border); }

/* ── Lists ── */
ul, ol { padding-left: 1.25rem; margin: 0.5rem 0; }
li { margin-bottom: 0.25rem; }
hr { border: none; border-top: 1px solid var(--wiki-border); margin: 1.25rem 0; }

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--wiki-bg); }
::-webkit-scrollbar-thumb { background: var(--wiki-border); border-radius: 3px; }

/* ── Responsive ── */
@media (max-width: 640px) {
  .site-header { height: auto; }
  .header-row { flex-wrap: wrap; height: auto; padding: 6px 0; gap: 4px; }
  .trigger {
    display: none;
    flex-direction: column;
    position: absolute;
    top: var(--wiki-nav-height);
    left: 0;
    right: 0;
    background: var(--wiki-nav-bg);
    border-bottom: 1px solid var(--wiki-border);
    padding: 4px 0;
    z-index: 99;
  }
  .nav-trigger:checked ~ .trigger { display: flex; }
  .nav-label { display: flex; align-items: center; }
  .page-link { padding: 6px 1rem !important; border-radius: 0; }
}
</style>
<script>
(function(){
  var STORAGE_KEY = 'wiki-theme';
  var DARK_VARS = [
    ['--wiki-bg', '#0d1117'],
    ['--wiki-text', '#e6edf3'],
    ['--wiki-heading', '#f0f6fc'],
    ['--wiki-link', '#52b788'],
    ['--wiki-link-hover', '#74c69d'],
    ['--wiki-border', '#30363d'],
    ['--wiki-nav-bg', '#161b22'],
    ['--wiki-code-bg', '#1e1e1e'],
    ['--wiki-code-text', '#f97583'],
    ['--wiki-muted', '#8b949e'],
    ['--wiki-nav-height', '44px']
  ];
  var LIGHT_VARS = [
    ['--wiki-bg', '#ffffff'],
    ['--wiki-text', '#1a1a1a'],
    ['--wiki-heading', '#000000'],
    ['--wiki-link', '#2d6a4f'],
    ['--wiki-link-hover', '#1b4332'],
    ['--wiki-border', '#dee2e6'],
    ['--wiki-nav-bg', '#f8f9fa'],
    ['--wiki-code-bg', '#f4f4f4'],
    ['--wiki-code-text', '#c7254e'],
    ['--wiki-muted', '#6c757d'],
    ['--wiki-nav-height', '44px']
  ];

  function getTheme(){
    var s = localStorage.getItem(STORAGE_KEY);
    if(s === 'light' || s === 'dark') return s;
    return 'dark';
  }

  function applyVars(theme){
    var vars = theme === 'light' ? LIGHT_VARS : DARK_VARS;
    var body = document.body;
    for(var i = 0; i < vars.length; i++){
      body.style.setProperty(vars[i][0], vars[i][1]);
      document.documentElement.style.setProperty(vars[i][0], vars[i][1]);
    }
  }

  function applyTheme(theme){
    var body = document.body;
    body.classList.remove('dark', 'light');
    void body.offsetHeight;
    body.classList.add(theme);
    applyVars(theme);
  }

  function toggleTheme(){
    var isDark = document.body.classList.contains('dark');
    applyTheme(isDark ? 'light' : 'dark');
    localStorage.setItem(STORAGE_KEY, isDark ? 'light' : 'dark');
  }

  window.toggleWikiTheme = toggleTheme;

  document.addEventListener('DOMContentLoaded', function(){
    applyTheme(getTheme());
  });
})();
</script>
