<!-- Theme toggle script — CSS lives in assets/main.css -->
<script>
(function(){
  var KEY = 'wiki-theme-v2';
  var DARK = {
    '--bg': '#000000', '--text': '#888888', '--heading': '#ffffff',
    '--muted': '#555555', '--border': '#222222', '--code-bg': '#0a0a0a'
  };
  var LIGHT = {
    '--bg': '#ffffff', '--text': '#333333', '--heading': '#000000',
    '--muted': '#888888', '--border': '#e0e0e0', '--code-bg': '#f5f5f5'
  };

  function get() {
    var s = localStorage.getItem(KEY);
    if (s === 'light' || s === 'dark') return s;
    return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
  }

  function apply(theme) {
    var vars = theme === 'light' ? LIGHT : DARK;
    var root = document.documentElement;
    var body = document.body;
    for (var k in vars) {
      root.style.setProperty(k, vars[k]);
      body.style.setProperty(k, vars[k]);
    }
    body.classList.remove('dark', 'light');
    void body.offsetHeight;
    body.classList.add(theme);
  }

  function toggle() { apply(get() === 'dark' ? 'light' : 'dark'); localStorage.setItem(KEY, get() === 'dark' ? 'light' : 'dark'); }

  window.toggleWikiTheme = toggle;

  document.addEventListener('DOMContentLoaded', function() { apply(get()); });
})();
</script>
