<!-- Theme: aligned to ADR style, minimal vars, ebook serif — injected by minima -->
<style>
/* ── Base: dark (default) ── */
:root {
  --wiki-bg: #0d1117;
  --wiki-text: #e6edf3;
  --wiki-heading: #f0f6fc;
  --wiki-link: #52b788;
  --wiki-link-hover: #74c69d;
  --wiki-border: #30363d;
  --wiki-nav-bg: #161b22;
  --wiki-code-bg: #1e1e1e;
  --wiki-code-text: #f97583;
  font-family: Georgia, 'Times New Roman', 'Book Antiqua', Palatino, serif;
  font-size: 17px;
  line-height: 1.8;
}
/* ── Light override ── */
body.light {
  --wiki-bg: #ffffff;
  --wiki-text: #1a1a1a;
  --wiki-heading: #000000;
  --wiki-link: #2d6a4f;
  --wiki-link-hover: #1b4332;
  --wiki-border: #dee2e6;
  --wiki-nav-bg: #f8f9fa;
  --wiki-code-bg: #f4f4f4;
  --wiki-code-text: #c7254e;
  font-family: Georgia, 'Times New Roman', 'Book Antiqua', Palatino, serif;
  font-size: 17px;
  line-height: 1.8;
}
body {
  background: var(--wiki-bg);
  color: var(--wiki-text);
  transition: background 0.2s ease, color 0.2s ease;
}
h1,h2,h3,h4,h5,h6 {
  color: var(--wiki-heading);
  font-weight: 600;
  line-height: 1.3;
}
h1 { font-size: 2rem; margin: 0.5rem 0 0.75rem; }
h2 { font-size: 1.5rem; margin: 1.5rem 0 0.5rem; border-bottom: 1px solid var(--wiki-border); padding-bottom: 0.3rem; }
h3 { font-size: 1.2rem; margin: 1.25rem 0 0.4rem; }
a { color: var(--wiki-link); text-decoration: none; }
a:hover { color: var(--wiki-link-hover); text-decoration: underline; }
.site-header {
  background: var(--wiki-nav-bg) !important;
  border-bottom: 1px solid var(--wiki-border) !important;
}
.site-header a { color: var(--wiki-heading) !important; text-decoration: none !important; }
.site-title { color: var(--wiki-heading) !important; font-size: 1.3rem; }
.site-footer {
  border-top: 1px solid var(--wiki-border);
  background: var(--wiki-nav-bg);
  color: var(--wiki-text);
  font-size: 0.85em;
}
.page-link { color: var(--wiki-link) !important; text-decoration: none !important; }
.page-link:hover { color: var(--wiki-link-hover) !important; }
.site-nav .trigger { background: var(--wiki-nav-bg); }
.site-nav li { border-bottom: 1px solid var(--wiki-border); }
.site-nav .page-link { color: var(--wiki-link); }
.site-nav .page-link:hover { color: var(--wiki-link-hover); }
hr { border: none; border-top: 1px solid var(--wiki-border); margin: 1.5rem 0; }
/* Code */
code {
  background: var(--wiki-code-bg) !important;
  color: var(--wiki-code-text) !important;
  border: none !important;
  padding: 1px 5px;
  font-size: 0.875em;
  font-family: 'Courier New', Courier, monospace;
}
.highlight, pre {
  background: var(--wiki-code-bg) !important;
  border: 1px solid var(--wiki-border);
  padding: 1rem;
  overflow-x: auto;
  font-size: 0.85em;
  line-height: 1.5;
}
pre code {
  background: transparent !important;
  color: inherit !important;
  padding: 0;
  border: none !important;
}
blockquote {
  border-left: 3px solid var(--wiki-link) !important;
  margin: 1.25rem 0;
  padding: 0.5rem 1rem;
  color: var(--wiki-text);
  opacity: 0.9;
  background: var(--wiki-nav-bg);
}
/* Tables */
table {
  border-collapse: collapse !important;
  border: 1px solid var(--wiki-border) !important;
  width: 100%;
  margin: 1.25rem 0;
  font-size: 0.95em;
}
th {
  background: var(--wiki-nav-bg) !important;
  color: var(--wiki-heading) !important;
  border: 1px solid var(--wiki-border) !important;
  padding: 8px 12px;
  font-weight: 700;
  text-align: left;
  font-size: 0.9em;
}
td {
  border: 1px solid var(--wiki-border) !important;
  padding: 7px 12px;
  color: var(--wiki-text) !important;
}
tbody tr:nth-child(even) { background: var(--wiki-bg) !important; }
tbody tr:hover { background: var(--wiki-nav-bg) !important; }
.nav-trigger:checked ~ .trigger { background: var(--wiki-nav-bg); }

/* ── Tag cloud — compact ── */
.tag, .tags { display: flex; flex-wrap: wrap; gap: 3px; padding: 0 !important; }
.tag, .tags a {
  background: var(--wiki-nav-bg) !important;
  color: var(--wiki-link) !important;
  border: 1px solid var(--wiki-border) !important;
  padding: 1px 5px !important;
  font-size: 0.7em !important;
  font-family: 'Courier New', monospace !important;
  text-decoration: none !important;
  border-radius: 4px;
  line-height: 1.4;
}
.tag:hover, .tags a:hover { background: var(--wiki-border) !important; }

/* ── Theme toggle: fixed top-right, pill ── */
.theme-btn {
  position: fixed;
  top: 14px;
  right: 18px;
  z-index: 9999;
  background: var(--wiki-nav-bg);
  border: 1px solid var(--wiki-border);
  color: var(--wiki-text);
  border-radius: 20px;
  font-size: 1rem;
  cursor: pointer;
  padding: 5px 14px;
  transition: background 0.2s, border-color 0.2s;
  font-family: inherit;
  line-height: 1;
}
.theme-btn:hover { background: var(--wiki-border); }

/* Content */
.page-content { padding: 2rem 0; }
.wrapper { max-width: 780px; }
</style>
<script>
(function(){
  var STORAGE_KEY = 'wiki-theme';
  var DARK_VARS = [
    ['--wiki-bg', '#0d1117'],
    ['--wiki-text', '#e6edf3'],
    ['--wiki-heading', '#f0f6fc'],
    ['--wiki-link', '#52b788'],
    ['--wiki-link-hover', '#74c69d'],
    ['--wiki-border', '#30363d'],
    ['--wiki-nav-bg', '#161b22'],
    ['--wiki-code-bg', '#1e1e1e'],
    ['--wiki-code-text', '#f97583']
  ];
  var LIGHT_VARS = [
    ['--wiki-bg', '#ffffff'],
    ['--wiki-text', '#1a1a1a'],
    ['--wiki-heading', '#000000'],
    ['--wiki-link', '#2d6a4f'],
    ['--wiki-link-hover', '#1b4332'],
    ['--wiki-border', '#dee2e6'],
    ['--wiki-nav-bg', '#f8f9fa'],
    ['--wiki-code-bg', '#f4f4f4'],
    ['--wiki-code-text', '#c7254e']
  ];

  function getTheme(){
    var s = localStorage.getItem(STORAGE_KEY);
    if(s === 'light' || s === 'dark') return s;
    return 'dark';
  }

  function applyVars(theme){
    var vars = theme === 'light' ? LIGHT_VARS : DARK_VARS;
    var body = document.body;
    for(var i = 0; i < vars.length; i++){
      body.style.setProperty(vars[i][0], vars[i][1]);
      document.documentElement.style.setProperty(vars[i][0], vars[i][1]);
    }
  }

  function applyTheme(theme){
    var body = document.body;
    body.classList.remove('dark', 'light');
    void body.offsetHeight;
    body.classList.add(theme);
    applyVars(theme);
  }

  function toggleTheme(){
    var isDark = document.body.classList.contains('dark');
    applyTheme(isDark ? 'light' : 'dark');
    localStorage.setItem(STORAGE_KEY, isDark ? 'light' : 'dark');
  }

  window.toggleWikiTheme = toggleTheme;

  document.addEventListener('DOMContentLoaded', function(){
    applyTheme(getTheme());
  });
})();
</script>
