<!-- OLED dark / e-ink light — minimal, uniform tables — injected by minima -->
<style>
/* Modern minimal CSS reset */
*, *::before, *::after { box-sizing: border-box; }
html { font-size: 16px; -webkit-text-size-adjust: 100%; }
body { margin: 0; line-height: 1.6; }
h1, h2, h3, h4, h5, h6, p { margin: 0; overflow-wrap: break-word; }
ul, ol { padding: 0; margin: 0; list-style: none; }
a { text-decoration: none; }
img, svg { display: block; max-width: 100%; }
button, input, select { font: inherit; }

/* ── Base: dark (OLED pure black) ── */
:root {
  --wiki-bg: #000000;
  --wiki-text: #cccccc;
  --wiki-heading: #ffffff;
  --wiki-link: #cccccc;
  --wiki-link-hover: #ffffff;
  --wiki-border: #333333;
  --wiki-nav-bg: #000000;
  --wiki-code-bg: #111111;
  --wiki-code-text: #cccccc;
  --wiki-muted: #888888;
  --wiki-nav-height: 40px;
  --wiki-table-bg: #111111;
  --wiki-table-border: #333333;
}
/* ── Light override (e-ink optimized) ── */
body.light {
  --wiki-bg: #ffffff;
  --wiki-text: #1a1a1a;
  --wiki-heading: #000000;
  --wiki-link: #1a1a1a;
  --wiki-link-hover: #000000;
  --wiki-border: #cccccc;
  --wiki-nav-bg: #ffffff;
  --wiki-code-bg: #f5f5f5;
  --wiki-code-text: #1a1a1a;
  --wiki-muted: #555555;
  --wiki-nav-height: 40px;
  --wiki-table-bg: #f5f5f5;
  --wiki-table-border: #cccccc;
}

body {
  background: var(--wiki-bg);
  color: var(--wiki-text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* ── Site header — sticky, minimal ── */
.site-header {
  background: var(--wiki-nav-bg);
  border-bottom: 1px solid var(--wiki-border);
  position: sticky;
  top: 0;
  z-index: 100;
  height: var(--wiki-nav-height);
}
.site-header .wrapper {
  max-width: 960px;
  margin: 0 auto;
  padding: 0 1.5rem;
  height: 100%;
}
.header-row {
  display: flex;
  align-items: center;
  height: var(--wiki-nav-height);
}
.site-title {
  color: var(--wiki-heading);
  font-size: 0.9rem;
  font-weight: 700;
  text-decoration: none;
  white-space: nowrap;
  flex-shrink: 0;
  margin-right: 1rem;
}
a.site-title:hover { color: var(--wiki-link-hover); }

/* ── Nav ── */
.site-nav { display: flex; align-items: center; flex: 1; min-width: 0; }
.nav-trigger { display: none; }
.nav-label { display: none; cursor: pointer; padding: 4px 8px; }
.menu-icon { display: flex; align-items: center; }
.trigger {
  display: flex;
  flex-wrap: nowrap;
  gap: 0;
  overflow-x: auto;
  scrollbar-width: none;
}
.trigger::-webkit-scrollbar { display: none; }
.page-link {
  color: var(--wiki-link);
  font-size: 0.8rem;
  white-space: nowrap;
  padding: 4px 10px;
  border-radius: 2px;
  flex-shrink: 0;
}
.page-link:hover { color: var(--wiki-link-hover); }

/* ── Theme toggle — inside header, right side ── */
#theme-toggle-wiki {
  background: transparent;
  border: 1px solid var(--wiki-border);
  color: var(--wiki-text);
  font-size: 1rem;
  width: 30px;
  height: 26px;
  border-radius: 2px;
  cursor: pointer;
  flex-shrink: 0;
  margin-left: auto;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0;
  vertical-align: middle;
  line-height: 1;
}

/* ── Content ── */
main.page-content {
  flex: 1;
  padding: 1.5rem 0 2.5rem;
}
main.page-content .wrapper {
  max-width: 780px;
  margin: 0 auto;
  padding: 0 1.5rem;
}

/* ── Typography ── */
h1, h2, h3, h4, h5, h6 {
  color: var(--wiki-heading);
  font-weight: 600;
  line-height: 1.3;
  margin: 1.25rem 0 0.4rem;
}
h1 { font-size: 1.6rem; margin-top: 0; }
h2 { font-size: 1.25rem; border-bottom: 1px solid var(--wiki-border); padding-bottom: 0.25rem; }
h3 { font-size: 1.05rem; }
a { color: var(--wiki-link); text-decoration: underline; }
a:hover { color: var(--wiki-link-hover); }
p { margin: 0.6rem 0; }
hr { border: none; border-top: 1px solid var(--wiki-border); margin: 1.25rem 0; }

/* ── Article ── */
.post-title { font-size: 1.4rem; margin: 0 0 0.25rem; color: var(--wiki-heading); }
.post-content h1 { font-size: 1.5rem; margin: 1.5rem 0 0.5rem; }
.post-content h2 { font-size: 1.2rem; margin: 1.25rem 0 0.4rem; }
.post-content h3 { font-size: 1rem; margin: 1rem 0 0.4rem; }
.post-content p { margin: 0.6rem 0; }
.post-content ul, .post-content ol { padding-left: 1.25rem; margin: 0.5rem 0; }
.post-content li { margin-bottom: 0.25rem; }

/* ── Code ── */
code {
  background: var(--wiki-code-bg);
  color: var(--wiki-code-text);
  padding: 1px 4px;
  font-size: 0.88em;
  font-family: 'Courier New', Courier, monospace;
  border-radius: 2px;
}
pre {
  background: var(--wiki-code-bg);
  border: 1px solid var(--wiki-border);
  padding: 0.75rem 1rem;
  overflow-x: auto;
  font-size: 0.85em;
  line-height: 1.55;
  border-radius: 2px;
  margin: 0.875rem 0;
}
pre code { background: transparent; color: inherit; padding: 0; }

/* ── Blockquote ── */
blockquote {
  border-left: 2px solid var(--wiki-border);
  margin: 0.875rem 0;
  padding: 0.5rem 0.875rem;
  color: var(--wiki-muted);
}

/* ── Tables — uniform, no alternating, no hover ── */
table {
  border-collapse: collapse;
  width: 100%;
  margin: 0.875rem 0;
  font-size: 0.88em;
  border: 1px solid var(--wiki-table-border);
}
th {
  background: var(--wiki-table-bg);
  color: var(--wiki-heading);
  padding: 6px 10px;
  font-weight: 600;
  text-align: left;
  border: 1px solid var(--wiki-table-border);
  font-size: 0.82em;
}
td {
  padding: 6px 10px;
  border: 1px solid var(--wiki-table-border);
  color: var(--wiki-text);
  background: var(--wiki-table-bg);
  vertical-align: top;
}

/* ── Footer ── */
.site-footer {
  border-top: 1px solid var(--wiki-border);
  background: var(--wiki-nav-bg);
  color: var(--wiki-muted);
  font-size: 0.78rem;
  padding: 0.75rem 1.5rem;
  text-align: center;
  margin-top: auto;
}
.site-footer a { color: var(--wiki-link); }

/* ── Tags ── */
.tags {
  display: flex;
  flex-wrap: wrap;
  gap: 3px;
  padding: 0;
  margin: 0.4rem 0;
}
.tags a, .tag {
  background: var(--wiki-bg);
  color: var(--wiki-text);
  border: 1px solid var(--wiki-border);
  padding: 1px 5px;
  font-size: 0.68em;
  font-family: 'Courier New', Courier, monospace;
  border-radius: 2px;
  text-decoration: none;
}
.tags a:hover { color: var(--wiki-link-hover); }

/* ── Theme toggle — fixed top-right pill ── */
.theme-btn {
  position: fixed;
  top: 8px;
  right: 10px;
  z-index: 200;
  background: var(--wiki-nav-bg);
  border: 1px solid var(--wiki-border);
  color: var(--wiki-text);
  border-radius: 2px;
  font-size: 0.85rem;
  cursor: pointer;
  padding: 3px 10px;
  font-family: inherit;
  line-height: 1;
  height: 26px;
  display: flex;
  align-items: center;
}

/* ── Theme toggle — integrated into header row (primary) ── */
#theme-toggle-wiki {
  position: static;
  background: transparent;
  border: 1px solid var(--wiki-border);
  color: var(--wiki-text);
  font-size: 1rem;
  width: 30px;
  height: 26px;
  border-radius: 2px;
  cursor: pointer;
  flex-shrink: 0;
  margin-left: auto;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ── Scrollbar ── */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: var(--wiki-bg); }
::-webkit-scrollbar-thumb { background: var(--wiki-border); border-radius: 2px; }

/* ── Responsive ── */
@media (max-width: 640px) {
  .site-header { height: auto; }
  .header-row { flex-wrap: wrap; height: auto; padding: 6px 0; }
  #theme-toggle-wiki { margin-left: 0; margin-top: 2px; }
  .trigger {
    display: none;
    flex-direction: column;
    position: absolute;
    top: var(--wiki-nav-height);
    left: 0;
    right: 0;
    background: var(--wiki-nav-bg);
    border-bottom: 1px solid var(--wiki-border);
    padding: 4px 0;
    z-index: 99;
  }
  .nav-trigger:checked ~ .trigger { display: flex; }
  .nav-label { display: flex; align-items: center; }
  .page-link { padding: 6px 1rem; }
  main.page-content .wrapper { padding: 0 1rem; }
}
</style>
<script>
(function(){
  var STORAGE_KEY = 'wiki-theme';
  var DARK_VARS = [
    ['--wiki-bg', '#000000'],
    ['--wiki-text', '#cccccc'],
    ['--wiki-heading', '#ffffff'],
    ['--wiki-link', '#cccccc'],
    ['--wiki-link-hover', '#ffffff'],
    ['--wiki-border', '#333333'],
    ['--wiki-nav-bg', '#000000'],
    ['--wiki-code-bg', '#111111'],
    ['--wiki-code-text', '#cccccc'],
    ['--wiki-muted', '#888888'],
    ['--wiki-nav-height', '40px'],
    ['--wiki-table-bg', '#111111'],
    ['--wiki-table-border', '#333333']
  ];
  var LIGHT_VARS = [
    ['--wiki-bg', '#ffffff'],
    ['--wiki-text', '#1a1a1a'],
    ['--wiki-heading', '#000000'],
    ['--wiki-link', '#1a1a1a'],
    ['--wiki-link-hover', '#000000'],
    ['--wiki-border', '#cccccc'],
    ['--wiki-nav-bg', '#ffffff'],
    ['--wiki-code-bg', '#f5f5f5'],
    ['--wiki-code-text', '#1a1a1a'],
    ['--wiki-muted', '#555555'],
    ['--wiki-nav-height', '40px'],
    ['--wiki-table-bg', '#f5f5f5'],
    ['--wiki-table-border', '#cccccc']
  ];

  function getTheme(){
    var s = localStorage.getItem(STORAGE_KEY);
    if(s === 'light' || s === 'dark') return s;
    return 'dark';
  }

  function applyVars(theme){
    var vars = theme === 'light' ? LIGHT_VARS : DARK_VARS;
    var body = document.body;
    for(var i = 0; i < vars.length; i++){
      body.style.setProperty(vars[i][0], vars[i][1]);
      document.documentElement.style.setProperty(vars[i][0], vars[i][1]);
    }
  }

  function applyTheme(theme){
    var body = document.body;
    body.classList.remove('dark', 'light');
    void body.offsetHeight;
    body.classList.add(theme);
    applyVars(theme);
  }

  function toggleTheme(){
    var isDark = document.body.classList.contains('dark');
    applyTheme(isDark ? 'light' : 'dark');
    localStorage.setItem(STORAGE_KEY, isDark ? 'light' : 'dark');
  }

  window.toggleWikiTheme = toggleTheme;

  document.addEventListener('DOMContentLoaded', function(){
    applyTheme(getTheme());
  });
})();
</script>
