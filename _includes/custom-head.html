<!-- Theme: refined margins/padding, consistent table colors, ADR-aligned — injected by minima -->
<style>
/* ── Base: dark (OLED pure black) ── */
:root {
  --wiki-bg: #000000;
  --wiki-text: #cccccc;
  --wiki-heading: #ffffff;
  --wiki-link: #cccccc;
  --wiki-link-hover: #ffffff;
  --wiki-border: #333333;
  --wiki-nav-bg: #000000;
  --wiki-code-bg: #111111;
  --wiki-code-text: #cccccc;
  --wiki-muted: #888888;
  --wiki-nav-height: 40px;
  --wiki-table-header: #111111;
  --wiki-table-border: #333333;
}
/* ── Light override (e-ink optimized: pure white) ── */
body.light {
  --wiki-bg: #ffffff;
  --wiki-text: #1a1a1a;
  --wiki-heading: #000000;
  --wiki-link: #1a1a1a;
  --wiki-link-hover: #000000;
  --wiki-border: #cccccc;
  --wiki-nav-bg: #ffffff;
  --wiki-code-bg: #f5f5f5;
  --wiki-code-text: #1a1a1a;
  --wiki-muted: #555555;
  --wiki-table-header: #f5f5f5;
  --wiki-table-border: #cccccc;
}
*, *::before, *::after { box-sizing: border-box; }
html { font-size: 16px; }

body {
  background: var(--wiki-bg);
  color: var(--wiki-text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  line-height: 1.6;
  margin: 0;
  padding: 0;
  
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* ── Layout ── */
main.page-content {
  flex: 1;
  padding: 2rem 0 3rem;
}
main.page-content .wrapper {
  max-width: 780px;
  margin: 0 auto;
  padding: 0 2rem;
}

/* ── Site header — sticky, compact ── */
.site-header {
  background: var(--wiki-nav-bg) !important;
  border-bottom: 1px solid var(--wiki-border) !important;
  position: sticky;
  top: 0;
  z-index: 100;
  height: var(--wiki-nav-height);
}
.site-header .wrapper {
  max-width: 960px;
  margin: 0 auto;
  padding: 0 1.5rem;
  height: 100%;
}
.header-row {
  display: flex;
  align-items: center;
  height: var(--wiki-nav-height);
}
.site-title {
  color: var(--wiki-heading) !important;
  font-size: 0.9rem !important;
  font-weight: 700;
  text-decoration: none !important;
  white-space: nowrap;
  flex-shrink: 0;
  margin-right: 1.5rem;
}
a.site-title:hover { text-decoration: none !important; color: var(--wiki-link-hover) !important; }

/* ── Nav — horizontal scroll ── */
.site-nav { display: flex; align-items: center; flex: 1; min-width: 0; }
.nav-trigger { display: none; }
.nav-label { display: none; cursor: pointer; padding: 4px 8px; border-radius: 4px; color: var(--wiki-text); }
.menu-icon { display: flex; align-items: center; }
.trigger {
  display: flex;
  flex-wrap: nowrap;
  gap: 0;
  overflow-x: auto;
  scrollbar-width: none;
  -ms-overflow-style: none;
}
.trigger::-webkit-scrollbar { display: none; }
.page-link {
  color: var(--wiki-link) !important;
  text-decoration: none !important;
  font-size: 0.8rem !important;
  white-space: nowrap;
  padding: 4px 10px !important;
  border-radius: 4px;
  
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif !important;
  flex-shrink: 0;
}
.page-link:hover {
  color: var(--wiki-link-hover) !important;
}

/* ── Typography ── */
h1,h2,h3,h4,h5,h6 {
  color: var(--wiki-heading);
  font-weight: 600;
  line-height: 1.3;
  margin: 1.25rem 0 0.5rem;
}
h1 { font-size: 1.6rem; margin-top: 0; }
h2 { font-size: 1.25rem; border-bottom: 1px solid var(--wiki-border); padding-bottom: 0.3rem; }
h3 { font-size: 1.05rem; }
a { color: var(--wiki-link); text-decoration: none; }
a:hover { color: var(--wiki-link-hover); text-decoration: underline; }
p { margin: 0.65rem 0; }
hr { border: none; border-top: 1px solid var(--wiki-border); margin: 1.5rem 0; }

/* ── Article content ── */
.post-header { margin-bottom: 1.25rem; }
.post-title { font-size: 1.4rem; margin: 0 0 0.25rem; color: var(--wiki-heading); }
.post-content h1 { font-size: 1.5rem; margin: 1.5rem 0 0.5rem; }
.post-content h2 { font-size: 1.2rem; border-bottom: 1px solid var(--wiki-border); padding-bottom: 0.3rem; margin: 1.5rem 0 0.5rem; }
.post-content h3 { font-size: 1rem; margin: 1.2rem 0 0.4rem; }
.post-content p { margin: 0.7rem 0; }
.post-content ul, .post-content ol { margin: 0.6rem 0; }
.post-content li { margin-bottom: 0.3rem; }

/* ── Code ── */
code {
  background: var(--wiki-code-bg) !important;
  color: var(--wiki-code-text) !important;
  border: none !important;
  padding: 1px 5px;
  font-size: 0.88em;
  font-family: 'Courier New', Courier, monospace;
  border-radius: 3px;
}
.highlight, pre {
  background: var(--wiki-code-bg) !important;
  border: 1px solid var(--wiki-border);
  padding: 0.875rem 1.125rem;
  overflow-x: auto;
  font-size: 0.85em;
  line-height: 1.6;
  border-radius: 6px;
  margin: 1rem 0;
}
pre code { background: transparent !important; color: inherit !important; padding: 0; border: none !important; }

/* ── Blockquote ── */
blockquote {
  border-left: 3px solid var(--wiki-link) !important;
  margin: 1rem 0;
  padding: 0.625rem 1rem;
  color: var(--wiki-text);
  background: var(--wiki-nav-bg);
  border-radius: 0 4px 4px 0;
  opacity: 0.9;
}

/* ── Tables — consistent, no alternating row colors ── */
table {
  border-collapse: collapse !important;
  border: 1px solid var(--wiki-table-border) !important;
  width: 100%;
  margin: 1rem 0;
  font-size: 0.9em;
}
th {
  background: var(--wiki-table-header) !important;
  color: var(--wiki-heading) !important;
  border: 1px solid var(--wiki-table-border) !important;
  padding: 7px 12px;
  font-weight: 600;
  font-size: 0.85em;
}
td {
  border: 1px solid var(--wiki-table-border) !important;
  padding: 7px 12px;
  color: var(--wiki-text) !important;
  background: var(--wiki-table-header) !important;
}
/* ── Footer ── */
.site-footer {
  border-top: 1px solid var(--wiki-border);
  background: var(--wiki-nav-bg);
  color: var(--wiki-muted);
  font-size: 0.8rem;
  padding: 1rem 1.5rem;
  text-align: center;
  margin-top: auto;
}
.site-footer a { color: var(--wiki-link); }

/* ── Tags — compact pill row ── */
.tags {
  display: flex;
  flex-wrap: wrap;
  gap: 3px;
  padding: 0 !important;
  margin: 0.5rem 0 !important;
}
.tags a, .tag {
  background: var(--wiki-nav-bg) !important;
  color: var(--wiki-link) !important;
  border: 1px solid var(--wiki-border) !important;
  padding: 1px 5px !important;
  font-size: 0.65em !important;
  font-family: 'Courier New', Courier, monospace !important;
  text-decoration: none !important;
  border-radius: 3px;
  line-height: 1.5;
}
.tags a:hover { color: var(--wiki-link-hover) !important; }

/* ── Theme toggle — fixed top-right pill ── */
.theme-btn {
  position: fixed;
  top: 8px;
  right: 10px;
  z-index: 200;
  background: var(--wiki-nav-bg);
  border: 1px solid var(--wiki-border);
  color: var(--wiki-text);
  border-radius: 16px;
  font-size: 0.85rem;
  cursor: pointer;
  padding: 3px 10px;
  font-family: inherit;
  line-height: 1;
  height: 26px;
  display: flex;
  align-items: center;
}
/* ── Scrollbar ── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--wiki-bg); }
::-webkit-scrollbar-thumb { background: var(--wiki-border); border-radius: 3px; }

/* ── Responsive ── */
@media (max-width: 640px) {
  .site-header { height: auto; }
  .header-row { flex-wrap: wrap; height: auto; padding: 6px 0; gap: 4px; }
  .trigger {
    display: none;
    flex-direction: column;
    position: absolute;
    top: var(--wiki-nav-height);
    left: 0;
    right: 0;
    background: var(--wiki-nav-bg);
    border-bottom: 1px solid var(--wiki-border);
    padding: 4px 0;
    z-index: 99;
  }
  .nav-trigger:checked ~ .trigger { display: flex; }
  .nav-label { display: flex; align-items: center; }
  .page-link { padding: 6px 1rem !important; border-radius: 0; }
  main.page-content .wrapper { padding: 0 1rem; }
}
</style>
<script>
(function(){
  var STORAGE_KEY = 'wiki-theme';
  var DARK_VARS = [
    ['--wiki-bg', '#000000'],
    ['--wiki-text', '#cccccc'],
    ['--wiki-heading', '#ffffff'],
    ['--wiki-link', '#cccccc'],
    ['--wiki-link-hover', '#ffffff'],
    ['--wiki-border', '#333333'],
    ['--wiki-nav-bg', '#000000'],
    ['--wiki-code-bg', '#111111'],
    ['--wiki-code-text', '#cccccc'],
    ['--wiki-muted', '#888888'],
    ['--wiki-nav-height', '40px'],
    ['--wiki-table-header', '#111111'],
    ['--wiki-table-border', '#333333']
  ];
  var LIGHT_VARS = [
    ['--wiki-bg', '#ffffff'],
    ['--wiki-text', '#1a1a1a'],
    ['--wiki-heading', '#000000'],
    ['--wiki-link', '#1a1a1a'],
    ['--wiki-link-hover', '#000000'],
    ['--wiki-border', '#cccccc'],
    ['--wiki-nav-bg', '#ffffff'],
    ['--wiki-code-bg', '#f5f5f5'],
    ['--wiki-code-text', '#1a1a1a'],
    ['--wiki-muted', '#555555'],
    ['--wiki-nav-height', '40px'],
    ['--wiki-table-header', '#f5f5f5'],
    ['--wiki-table-border', '#cccccc']
  ];

  function getTheme(){
    var s = localStorage.getItem(STORAGE_KEY);
    if(s === 'light' || s === 'dark') return s;
    return 'dark';
  }

  function applyVars(theme){
    var vars = theme === 'light' ? LIGHT_VARS : DARK_VARS;
    var body = document.body;
    for(var i = 0; i < vars.length; i++){
      body.style.setProperty(vars[i][0], vars[i][1]);
      document.documentElement.style.setProperty(vars[i][0], vars[i][1]);
    }
  }

  function applyTheme(theme){
    var body = document.body;
    body.classList.remove('dark', 'light');
    void body.offsetHeight;
    body.classList.add(theme);
    applyVars(theme);
  }

  function toggleTheme(){
    var isDark = document.body.classList.contains('dark');
    applyTheme(isDark ? 'light' : 'dark');
    localStorage.setItem(STORAGE_KEY, isDark ? 'light' : 'dark');
  }

  window.toggleWikiTheme = toggleTheme;

  document.addEventListener('DOMContentLoaded', function(){
    applyTheme(getTheme());
  });
})();
</script>
