# Jekyll config for GitHub Pages
title: RegenTribes Knowledge Wiki
description: Genesis knowledge graph and governance research vault
theme: minima
plugins:
  - jekyll-optional-front-matter
  - jekyll-redirect-from

github:
  repository_url: https://github.com/genesis-zero-bot/genesis-zero-bot-wiki

markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter_opts:
    disable: true

exclude:
  - .openclaw-wiki/
  - .rumdl_cache/
  - _attachments/
  - node_modules/

collections:
  sources:
    output: true
    permalink: /sources/:name/
  concepts:
    output: true
    permalink: /concepts/:name/
  entities:
    output: true
    permalink: /entities/:name/
  syntheses:
    output: true
    permalink: /syntheses/:name/

defaults:
  - scope:
      path: ""
    values:
      layout: page